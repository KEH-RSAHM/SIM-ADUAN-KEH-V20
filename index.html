<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SIM Aduan RSJD AHMA - Sistem Informasi Manajemen Aduan</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: { sans: ['Inter','ui-sans-serif','system-ui'] },
        boxShadow: { soft: '0 10px 40px -10px rgba(0,0,0,0.15)' }
      }
    }
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{font-family:'Inter',system-ui}
  .scrollbar-thin::-webkit-scrollbar{width:6px;height:6px}
  .scrollbar-thin::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:999px}
  .dark .scrollbar-thin::-webkit-scrollbar-thumb{background:#334155}
  .animate-in{animation: in .25s ease}
  @keyframes in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body class="bg-[#f6f8fb] dark:bg-slate-950 text-slate-800 dark:text-slate-100 antialiased">
<div id="app" class="min-h-screen"></div>

<!-- Toast Container -->
<div id="toast-container" class="fixed top-4 right-4 z-[100] space-y-2"></div>

<!-- Change Password Modal -->
<div id="password-modal" class="fixed inset-0 z-[90] hidden">
  <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" data-close="password-modal"></div>
  <div class="relative z-10 flex min-h-full items-center justify-center p-4">
    <div class="w-full max-w-md rounded-2xl bg-white dark:bg-slate-900 shadow-soft border border-slate-200 dark:border-slate-800 animate-in">
      <div class="px-6 pt-6 pb-2 flex items-center justify-between">
        <div>
          <h3 class="text-lg font-semibold">Ubah Password</h3>
          <p class="text-sm text-slate-500 dark:text-slate-400">Gunakan password yang kuat dan mudah diingat</p>
        </div>
        <button data-close="password-modal" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <form id="password-form" class="px-6 pb-6 pt-2 space-y-4">
        <div>
          <label class="text-sm font-medium text-slate-700 dark:text-slate-300">Password Lama</label>
          <div class="relative mt-1.5">
            <input type="password" id="old-password" class="w-full rounded-xl border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 px-3.5 py-2.5 pr-11 text-sm outline-none focus:ring-4 focus:ring-emerald-500/20 focus:border-emerald-500" placeholder="••••••••" required />
            <button type="button" data-toggle="old-password" class="absolute right-2.5 top-1/2 -translate-y-1/2 p-1.5 rounded-lg text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800">👁</button>
          </div>
          <p class="mt-1 text-xs text-slate-500">Untuk UX, tidak diverifikasi server untuk provider email.</p>
        </div>
        <div>
          <label class="text-sm font-medium text-slate-700 dark:text-slate-300">Password Baru</label>
          <div class="relative mt-1.5">
            <input type="password" id="new-password" minlength="6" class="w-full rounded-xl border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 px-3.5 py-2.5 pr-11 text-sm outline-none focus:ring-4 focus:ring-emerald-500/20 focus:border-emerald-500" placeholder="Minimal 6 karakter" required />
            <button type="button" data-toggle="new-password" class="absolute right-2.5 top-1/2 -translate-y-1/2 p-1.5 rounded-lg text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800">👁</button>
          </div>
        </div>
        <div>
          <label class="text-sm font-medium text-slate-700 dark:text-slate-300">Konfirmasi Password Baru</label>
          <div class="relative mt-1.5">
            <input type="password" id="confirm-password" minlength="6" class="w-full rounded-xl border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 px-3.5 py-2.5 pr-11 text-sm outline-none focus:ring-4 focus:ring-emerald-500/20 focus:border-emerald-500" placeholder="Ulangi password baru" required />
            <button type="button" data-toggle="confirm-password" class="absolute right-2.5 top-1/2 -translate-y-1/2 p-1.5 rounded-lg text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800">👁</button>
          </div>
          <p id="password-error" class="mt-1.5 text-xs text-rose-600 hidden"></p>
        </div>
        <div class="flex items-center justify-end gap-2 pt-2">
          <button type="button" data-close="password-modal" class="px-4 py-2.5 rounded-xl text-sm font-medium bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700">Batal</button>
          <button id="password-submit" type="submit" class="px-4 py-2.5 rounded-xl text-sm font-semibold bg-emerald-600 hover:bg-emerald-700 text-white shadow-sm disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
            <span>Simpan Password</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
(() => {
  // ---------- State ----------
  const initialCMS = JSON.parse(localStorage.getItem('rsjd_cms') || 'null') || {
    heroTitle: 'SIM Aduan RSJD Dr. Amino Gondohutomo',
    heroSubtitle: 'Layanan pengaduan terintegrasi untuk meningkatkan mutu pelayanan Rumah Sakit Jiwa Daerah.',
    heroBadge: 'Cepat • Transparan • Akuntabel',
    stats: [
      { label: 'Aduan Diproses', value: '1,248' },
      { label: 'Waktu Respons', value: '< 24 Jam' },
      { label: 'Kepuasan', value: '96%' },
    ]
  };

  const usersSeed = [
    { id: 'u1', name: 'Super Admin', email: 'superadmin@rsjd.go.id', role: 'superadmin', password: 'admin123', avatar: 'SA' },
    { id: 'u2', name: 'Admin Verifikator', email: 'admin@rsjd.go.id', role: 'admin', password: 'admin123', avatar: 'AV' },
    { id: 'u3', name: 'Petugas Penanganan', email: 'petugas@rsjd.go.id', role: 'petugas', password: 'admin123', avatar: 'PP' },
    { id: 'u4', name: 'Pimpinan', email: 'pimpinan@rsjd.go.id', role: 'pimpinan', password: 'admin123', avatar: 'PI' },
  ];

  const state = {
    view: 'landing',
    user: JSON.parse(localStorage.getItem('rsjd_session') || 'null'),
    theme: localStorage.getItem('rsjd_theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'),
    activeModule: 'dashboard',
    cms: initialCMS,
    users: JSON.parse(localStorage.getItem('rsjd_users') || 'null') || usersSeed,
    aduan: JSON.parse(localStorage.getItem('rsjd_aduan') || 'null') || [
      { id: 'ADU-2024-001', judul: 'AC ruang tunggu tidak dingin', kategori: 'Fasilitas', status: 'verifikasi', prioritas: 'Tinggi', tanggal: '2024-12-01', pelapor: 'Budi S.' },
      { id: 'ADU-2024-002', judul: 'Pelayanan pendaftaran lambat', kategori: 'Pelayanan', status: 'penanganan', prioritas: 'Sedang', tanggal: '2024-12-02', pelapor: 'Siti A.' },
      { id: 'ADU-2024-003', judul: 'Toilet lantai 2 kotor', kategori: 'Kebersihan', status: 'selesai', prioritas: 'Rendah', tanggal: '2024-11-30', pelapor: 'Anonim' },
      { id: 'ADU-2024-004', judul: 'Parkir penuh', kategori: 'Fasilitas', status: 'otorisasi', prioritas: 'Sedang', tanggal: '2024-12-03', pelapor: 'Joko P.' },
    ],
    kategori: ['Fasilitas','Pelayanan','Kebersihan','Keamanan','Lainnya'],
    isPasswordLoading: false,
  };

  // ---------- Supabase Mock ----------
  const supabase = window.supabase.createClient('https://example.supabase.co', 'public-anon-key');

  supabase.auth.getUser = async () => ({ data: { user: state.user }, error: null });
  supabase.auth.getSession = async () => ({ data: { session: state.user ? { user: state.user } : null } });
  supabase.auth.signInWithPassword = async ({ email, password }) => {
    await new Promise(r=>setTimeout(r,600));
    const found = state.users.find(u => u.email.toLowerCase()===email.toLowerCase() && u.password===password);
    if (!found) return { data: null, error: { message: 'Email atau password salah' } };
    state.user = { ...found };
    delete state.user.password;
    localStorage.setItem('rsjd_session', JSON.stringify(state.user));
    return { data: { user: state.user }, error: null };
  };
  supabase.auth.signOut = async () => {
    state.user = null;
    localStorage.removeItem('rsjd_session');
    return { error: null };
  };
  supabase.auth.updateUser = async ({ password }) => {
    await new Promise(r=>setTimeout(r,900));
    if (!state.user) return { data: null, error: { message: 'Tidak terautentikasi' } };
    const idx = state.users.findIndex(u => u.id===state.user.id);
    if (idx>=0) {
      state.users[idx].password = password;
      localStorage.setItem('rsjd_users', JSON.stringify(state.users));
    }
    return { data: { user: state.user }, error: null };
  };

  // ---------- Helpers ----------
  const $ = sel => document.querySelector(sel);
  const $$ = sel => [...document.querySelectorAll(sel)];
  const toast = (msg, type='success') => {
    const wrap = $('#toast-container');
    const el = document.createElement('div');
    el.className = `animate-in min-w-[300px] max-w-md rounded-2xl border shadow-soft px-4 py-3 flex items-start gap-3 ${type==='success' ? 'bg-emerald-600 border-emerald-500 text-white' : 'bg-rose-600 border-rose-500 text-white'}`;
    el.innerHTML = `<div class="mt-0.5">${type==='success' ? '✓' : '!'}</div><div class="flex-1 text-sm font-medium">${msg}</div><button class="opacity-70 hover:opacity-100" onclick="this.parentElement.remove()">✕</button>`;
    wrap.appendChild(el);
    setTimeout(()=> el.remove(), 4000);
  };
  const save = () => {
    localStorage.setItem('rsjd_aduan', JSON.stringify(state.aduan));
    localStorage.setItem('rsjd_cms', JSON.stringify(state.cms));
  };
  const formatRole = r => ({ superadmin:'Super Admin', admin:'Admin', petugas:'Petugas', pimpinan:'Pimpinan' }[r]||r);
  const statusBadge = s => {
    const map = {
      verifikasi:'bg-amber-100 text-amber-800 dark:bg-amber-900/30 dark:text-amber-300',
      penanganan:'bg-sky-100 text-sky-800 dark:bg-sky-900/30 dark:text-sky-300',
      otorisasi:'bg-violet-100 text-violet-800 dark:bg-violet-900/30 dark:text-violet-300',
      selesai:'bg-emerald-100 text-emerald-800 dark:bg-emerald-900/30 dark:text-emerald-300',
    };
    return `<span class="px-2.5 py-1 rounded-full text-xs font-medium ${map[s]||'bg-slate-200'}">${s.toUpperCase()}</span>`;
  };

  // ---------- Theme ----------
  const applyTheme = () => {
    document.documentElement.classList.toggle('dark', state.theme==='dark');
    localStorage.setItem('rsjd_theme', state.theme);
  };
  applyTheme();

  // ---------- Render ----------
  function render() {
    const app = $('#app');
    if (!state.user) {
      if (state.view==='login') return app.innerHTML = renderLogin();
      return app.innerHTML = renderLanding();
    }
    app.innerHTML = renderApp();
    bindAppEvents();
  }

  function renderLanding() {
    const s = state.cms;
    return `
    <header class="sticky top-0 z-40 border-b border-slate-200/70 dark:border-slate-800 bg-white/80 dark:bg-slate-950/80 backdrop-blur-xl">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="size-9 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-600 grid place-items-center text-white font-black">AH</div>
          <div class="leading-tight">
            <div class="font-bold">RSJD AHMA</div>
            <div class="text-[11px] uppercase tracking-wide text-slate-500">SIM Aduan</div>
          </div>
        <nav class="hidden md:flex items-center gap-7 text-sm font-medium text-slate-600 dark:text-slate-300">
          <a href="#fitur" class="hover:text-emerald-600">Fitur</a>
          <a href="#alur" class="hover:text-emerald-600">Alur</a>
          <a href="#kontak" class="hover:text-emerald-600">Kontak</a>
        </nav>
        <div class="flex items-center gap-2">
          <button data-action="toggle-theme" class="size-9 grid place-items-center rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-800">🌓</button>
          <button data-action="go-login" class="hidden sm:inline-flex px-4 py-2 rounded-xl bg-slate-900 dark:bg-white text-white dark:text-slate-900 text-sm font-semibold hover:opacity-90">Masuk</button>
        </div>
      </div>
    </header>

    <main>
      <section class="relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-b from-emerald-50 to-transparent dark:from-emerald-950/20"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 lg:py-28 grid lg:grid-cols-2 gap-12 items-center relative">
          <div>
            <span class="inline-flex items-center gap-2 px-3 py-1 rounded-full text-xs font-semibold bg-emerald-600/10 text-emerald-700 dark:text-emerald-300 border border-emerald-600/20">${s.heroBadge}</span>
            <h1 class="mt-4 text-4xl lg:text-5xl font-extrabold tracking-tight leading-[1.1]">${s.heroTitle}</h1>
            <p class="mt-4 text-lg text-slate-600 dark:text-slate-300">${s.heroSubtitle}</p>
            <div class="mt-8 flex flex-wrap gap-3">
              <button data-action="go-login" class="px-5 py-3 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-semibold shadow-sm">Masuk Sistem</button>
              <button onclick="document.getElementById('fitur').scrollIntoView({behavior:'smooth'})" class="px-5 py-3 rounded-xl border border-slate-300 dark:border-slate-700 font-semibold hover:bg-slate-100 dark:hover:bg-slate-800">Pelajari Lebih Lanjut</button>
            </div>
            <div class="mt-10 grid grid-cols-3 gap-6">
              ${s.stats.map(st=>`
                <div>
                  <div class="text-2xl font-bold">${st.value}</div>
                  <div class="text-sm text-slate-500">${st.label}</div>
                </div>`).join('')}
            </div>
          <div class="relative">
            <div class="rounded-[2rem] border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-soft p-3">
              <div class="rounded-[1.5rem] bg-gradient-to-br from-slate-900 to-slate-800 p-6 text-white">
                <div class="flex items-center justify-between">
                  <div class="font-semibold">Dashboard Aduan</div>
                  <span class="text-xs px-2 py-0.5 rounded-full bg-white/10">Live</span>
                </div>
                <div class="mt-6 grid grid-cols-2 gap-3">
                  ${['Verifikasi','Penanganan','Otorisasi','Selesai'].map((l,i)=>`
                    <div class="rounded-2xl bg-white/5 border border-white/10 p-4">
                      <div class="text-2xl font-bold">${[12,8,5,124][i]}</div>
                      <div class="text-xs opacity-80">${l}</div>
                    </div>`).join('')}
                </div>
                <div class="mt-6 h-24 rounded-xl bg-white/5 border border-white/10 p-3 flex items-end gap-1">
                  ${Array.from({length:18}).map((_,i)=>`<div class="flex-1 rounded-t bg-emerald-400/80" style="height:${20+Math.sin(i)*40+Math.random()*30}%"></div>`).join('')}
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section id="fitur" class="py-20 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <h2 class="text-3xl font-bold text-center">Modul Terintegrasi</h2>
          <p class="text-center text-slate-600 dark:text-slate-400 mt-2 max-w-2xl mx-auto">Lengkap dari pelaporan hingga pelaporan manajemen dengan kontrol role berbasis Supabase Auth.</p>
          <div class="mt-12 grid md:grid-cols-3 gap-6">
            ${[
              {t:'Aduan Masyarakat',d:'Form aduan publik & internal dengan tracking ID',i:'📨'},
              {t:'Verifikasi',d:'Validasi kelengkapan dan klasifikasi aduan',i:'🔍'},
              {t:'Penanganan',d:'Assign petugas, SLA, & update progres',i:'🛠️'},
              {t:'Otorisasi Pimpinan',d:'Approval eskalasi & tindakan strategis',i:'✅'},
              {t:'Pelaporan',d:'Dashboard analitik & export data',i:'📊'},
              {t:'Parameter & CMS',d:'Master data, konten landing, tema',i:'⚙️'},
            ].map(c=>`
              <div class="rounded-2xl border border-slate-200 dark:border-slate-800 p-6 bg-[#fbfdff] dark:bg-slate-950">
                <div class="text-2xl">${c.i}</div>
                <div class="mt-3 font-semibold">${c.t}</div>
                <div class="text-sm text-slate-600 dark:text-slate-400 mt-1">${c.d}</div>
              </div>`).join('')}
          </div>
        </div>
      </section>
    </main>

    <footer id="kontak" class="border-t border-slate-200 dark:border-slate-800 py-10 text-center text-sm text-slate-500">
      © 2024 RSJD Dr. Amino Gondohutomo • SIM Aduan v1.0
    </footer>
    `;
  }

  function renderLogin() {
    return `
    <div class="min-h-screen grid place-items-center px-4 py-12 bg-gradient-to-br from-emerald-50 via-white to-teal-50 dark:from-slate-950 dark:via-slate-950 dark:to-emerald-950/20">
      <div class="w-full max-w-[420px]">
        <button data-action="go-landing" class="mb-6 inline-flex items-center gap-2 text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-emerald-600">← Kembali ke Beranda</button>
        <div class="rounded-[1.5rem] border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-soft p-8">
          <div class="flex items-center gap-3">
            <div class="size-11 rounded-2xl bg-gradient-to-br from-emerald-500 to-teal-600 grid place-items-center text-white font-black text-lg">AH</div>
            <div>
              <div class="font-bold text-lg leading-tight">Masuk SIM Aduan</div>
              <div class="text-xs text-slate-500">RSJD Dr. Amino Gondohutomo</div>
            </div>
          </div>
          <form id="login-form" class="mt-7 space-y-4">
            <div>
              <label class="text-sm font-medium">Email</label>
              <input type="email" name="email" required value="admin@rsjd.go.id" class="mt-1.5 w-full rounded-xl border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 px-3.5 py-2.5 text-sm focus:ring-4 focus:ring-emerald-500/20 focus:border-emerald-500 outline-none" />
            </div>
            <div>
              <label class="text-sm font-medium">Password</label>
              <input type="password" name="password" required value="admin123" class="mt-1.5 w-full rounded-xl border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 px-3.5 py-2.5 text-sm focus:ring-4 focus:ring-emerald-500/20 focus:border-emerald-500 outline-none" />
            </div>
            <button class="w-full py-3 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-semibold mt-2">Masuk</button>
            <p class="text-xs text-slate-500 text-center">Demo: admin@rsjd.go.id / petugas@rsjd.go.id / pimpinan@rsjd.go.id / superadmin@rsjd.go.id • pass: admin123</p>
          </form>
        </div>
      </div>
    </div>
    `;
  }

  function renderApp() {
    const modules = [
      { key:'dashboard', label:'Dashboard', icon:'🏠', roles:['superadmin','admin','petugas','pimpinan'] },
      { key:'aduan', label:'Aduan', icon:'📨', roles:['superadmin','admin','petugas','pimpinan'] },
      { key:'verifikasi', label:'Verifikasi', icon:'🔍', roles:['superadmin','admin'] },
      { key:'penanganan', label:'Penanganan', icon:'🛠️', roles:['superadmin','admin','petugas'] },
      { key:'otorisasi', label:'Otorisasi', icon:'✅', roles:['superadmin','pimpinan'] },
      { key:'pelaporan', label:'Pelaporan', icon:'📊', roles:['superadmin','admin','pimpinan'] },
      { key:'parameter', label:'Parameter', icon:'🗂️', roles:['superadmin'] },
      { key:'cms', label:'CMS Landing', icon:'🎨', roles:['superadmin'] },
      { key:'pengaturan', label:'Pengaturan Akun', icon:'⚙️', roles:['superadmin','admin','petugas','pimpinan'] },
      { key:'superadmin', label:'Super Admin', icon:'👑', roles:['superadmin'] },
    ].filter(m=>m.roles.includes(state.user.role));

    return `
    <div class="min-h-screen flex">
      <!-- Sidebar -->
      <aside id="sidebar" class="fixed lg:sticky top-0 z-40 h-screen w-[280px] shrink-0 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 flex flex-col transition-transform lg:translate-x-0 -translate-x-full">
        <div class="h-16 flex items-center gap-3 px-5 border-b border-slate-200 dark:border-slate-800">
          <div class="size-10 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-600 grid place-items-center text-white font-black">AH</div>
          <div>
            <div class="font-bold leading-tight">SIM Aduan</div>
            <div class="text-[11px] uppercase tracking-wide text-slate-500">RSJD AHMA</div>
          </div>
        </div>
        <nav class="flex-1 overflow-y-auto p-3 scrollbar-thin space-y-1">
          ${modules.map(m=>`
            <button data-module="${m.key}" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition ${state.activeModule===m.key ? 'bg-emerald-600 text-white shadow-sm' : 'hover:bg-slate-100 dark:hover:bg-slate-900 text-slate-700 dark:text-slate-300'}">
              <span class="text-lg">${m.icon}</span><span>${m.label}</span>
            </button>`).join('')}
        </nav>
        <div class="p-3 border-t border-slate-200 dark:border-slate-800">
          <div class="flex items-center gap-3 px-2 py-2">
            <div class="size-9 rounded-full bg-slate-900 dark:bg-slate-800 text-white grid place-items-center font-bold text-sm">${state.user.avatar}</div>
            <div class="min-w-0">
              <div class="text-sm font-semibold truncate">${state.user.name}</div>
              <div class="text-xs text-slate-500">${formatRole(state.user.role)}</div>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main -->
      <div class="flex-1 min-w-0 flex flex-col">
        <!-- Header -->
        <header class="sticky top-0 z-30 h-16 border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-950/80 backdrop-blur-xl flex items-center justify-between px-4 lg:px-6">
          <div class="flex items-center gap-2">
            <button data-action="toggle-sidebar" class="lg:hidden size-9 grid place-items-center rounded-xl border border-slate-200 dark:border-slate-800">☰</button>
            <div>
              <h1 class="font-semibold leading-tight">${modules.find(m=>m.key===state.activeModule)?.label || ''}</h1>
              <p class="text-xs text-slate-500 hidden sm:block">Selamat datang kembali, ${state.user.name.split(' ')[0]}</p>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <button data-action="toggle-theme" title="Ganti Tema" class="size-9 grid place-items-center rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-800">🌓</button>
            <div class="relative">
              <button id="profile-btn" class="flex items-center gap-2 pl-1 pr-2 py-1 rounded-full border border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-800">
                <div class="size-8 rounded-full bg-emerald-600 text-white grid place-items-center font-bold text-sm">${state.user.avatar}</div>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
              </button>
              <div id="profile-menu" class="hidden absolute right-0 mt-2 w-56 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-soft p-1.5 z-50">
                <div class="px-3 py-2">
                  <div class="text-sm font-semibold">${state.user.name}</div>
                  <div class="text-xs text-slate-500">${state.user.email}</div>
                </div>
                <div class="h-px bg-slate-200 dark:bg-slate-800 my-1"></div>
                <button data-action="open-settings" class="w-full text-left px-3 py-2 rounded-xl text-sm hover:bg-slate-100 dark:hover:bg-slate-800">Pengaturan Akun</button>
                <button data-action="open-password" class="w-full text-left px-3 py-2 rounded-xl text-sm hover:bg-slate-100 dark:hover:bg-slate-800">Ubah Password</button>
                <div class="h-px bg-slate-200 dark:bg-slate-800 my-1"></div>
                <button data-action="logout" class="w-full text-left px-3 py-2 rounded-xl text-sm text-rose-600 hover:bg-rose-50 dark:hover:bg-rose-950/40">Keluar</button>
              </div>
            </div>
          </div>
        </header>

        <!-- Content -->
        <main class="flex-1 p-4 lg:p-6 bg-[#f6f8fb] dark:bg-slate-950">
          <div class="max-w-7xl mx-auto">
            ${renderModule()}
          </div>
        </main>
      </div>
    </div>
    `;
  }

  function renderModule() {
    const m = state.activeModule;
    if (m==='dashboard') return renderDashboard();
    if (m==='aduan') return renderAduan();
    if (m==='verifikasi') return renderVerifikasi();
    if (m==='penanganan') return renderPenanganan();
    if (m==='otorisasi') return renderOtorisasi();
    if (m==='pelaporan') return renderPelaporan();
    if (m==='parameter') return renderParameter();
    if (m==='cms') return renderCMS();
    if (m==='pengaturan') return renderPengaturan();
    if (m==='superadmin') return renderSuperadmin();
    return '<div>Modul tidak ditemukan</div>';
  }

  function card(title, child) {
    return `<div class="rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900">
      <div class="px-5 py-4 border-b border-slate-200 dark:border-slate-800 font-semibold">${title}</div>
      <div class="p-5">${child}</div>
    </div>`;
  }

  function renderDashboard() {
    const total = state.aduan.length;
    const selesai = state.aduan.filter(a=>a.status==='selesai').length;
    return `
    <div class="grid lg:grid-cols-3 gap-6">
      ${[
        {l:'Total Aduan',v:total,i:'📨'},
        {l:'Selesai',v:selesai,i:'✅'},
        {l:'Dalam Proses',v:total-selesai,i:'⏳'},
      ].map(c=>`
        <div class="rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-5 flex items-center gap-4">
          <div class="size-12 rounded-2xl bg-emerald-600/10 text-emerald-700 dark:text-emerald-300 grid place-items-center text-2xl">${c.i}</div>
          <div><div class="text-2xl font-bold">${c.v}</div><div class="text-sm text-slate-500">${c.l}</div></div>
        </div>`).join('')}
      <div class="lg:col-span-3">
        ${card('Aduan Terbaru', `
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="text-left text-slate-500"><tr class="border-b border-slate-200 dark:border-slate-800"><th class="py-2 font-medium">ID</th><th class="font-medium">Judul</th><th class="font-medium">Kategori</th><th class="font-medium">Status</th></tr></thead>
              <tbody>
                ${state.aduan.slice(0,5).map(a=>`
                  <tr class="border-b border-slate-100 dark:border-slate-800/70">
                    <td class="py-3 font-mono text-xs">${a.id}</td>
                    <td class="py-3 font-medium">${a.judul}</td>
                    <td class="py-3 text-slate-600 dark:text-slate-400">${a.kategori}</td>
                    <td class="py-3">${statusBadge(a.status)}</td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>
        `)}
      </div>
    </div>`;
  }

  function renderAduan() {
    return card('Daftar Aduan <button data-action="add-aduan" class="float-right -mt-1 px-3 py-1.5 rounded-lg bg-emerald-600 text-white text-xs font-semibold">+ Aduan Baru</button>', `
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead><tr class="text-left text-slate-500 border-b border-slate-200 dark:border-slate-800"><th class="py-2 font-medium">ID</th><th>Judul</th><th>Pelapor</th><th>Prioritas</th><th>Status</th></tr></thead>
          <tbody>
            ${state.aduan.map(a=>`
              <tr class="border-b border-slate-100 dark:border-slate-800/60 hover:bg-slate-50 dark:hover:bg-slate-800/50">
                <td class="py-3 font-mono text-xs">${a.id}</td>
                <td class="py-3"><div class="font-medium">${a.judul}</div><div class="text-xs text-slate-500">${a.kategori} • ${a.tanggal}</div></td>
                <td class="py-3">${a.pelapor}</td>
                <td class="py-3">${a.prioritas}</td>
                <td class="py-3">${statusBadge(a.status)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    `);
  }

  function renderVerifikasi() {
    const list = state.aduan.filter(a=>a.status==='verifikasi');
    return card('Verifikasi Aduan', list.length? `
      <div class="space-y-3">
        ${list.map(a=>`
          <div class="rounded-xl border border-slate-200 dark:border-slate-800 p-4 flex items-center justify-between">
            <div><div class="font-semibold">${a.judul}</div><div class="text-xs text-slate-500">${a.id} • ${a.kategori}</div></div>
            <div class="flex gap-2">
              <button data-action="verify" data-id="${a.id}" class="px-3 py-1.5 rounded-lg bg-emerald-600 text-white text-xs font-semibold">Verifikasi</button>
              <button class="px-3 py-1.5 rounded-lg border text-xs">Tolak</button>
            </div>
          </div>`).join('')}
      </div>` : `<div class="text-sm text-slate-500">Tidak ada aduan menunggu verifikasi.</div>`);
  }

  function renderPenanganan() {
    const list = state.aduan.filter(a=>['penanganan','verifikasi'].includes(a.status));
    return card('Penanganan Aduan', `
      <div class="grid md:grid-cols-2 gap-4">
        ${list.map(a=>`
          <div class="rounded-xl border border-slate-200 dark:border-slate-800 p-4">
            <div class="flex items-start justify-between">
              <div><div class="font-semibold">${a.judul}</div><div class="text-xs text-slate-500">${a.id}</div></div>
              ${statusBadge(a.status)}
            </div>
            <div class="mt-3 flex gap-2">
              <button data-action="process" data-id="${a.id}" class="px-3 py-1.5 rounded-lg bg-sky-600 text-white text-xs font-semibold">Proses</button>
              <button class="px-3 py-1.5 rounded-lg border text-xs">Detail</button>
            </div>
          </div>`).join('')}
      </div>
    `);
  }

  function renderOtorisasi() {
    const list = state.aduan.filter(a=>a.status==='otorisasi');
    return card('Otorisasi Pimpinan', `
      ${list.length? list.map(a=>`
        <div class="rounded-xl border border-slate-200 dark:border-slate-800 p-4 flex items-center justify-between">
          <div><div class="font-semibold">${a.judul}</div><div class="text-xs text-slate-500">${a.id}</div></div>
          <button data-action="authorize" data-id="${a.id}" class="px-3 py-1.5 rounded-lg bg-violet-600 text-white text-xs font-semibold">Setujui</button>
        </div>`).join('') : `<div class="text-sm text-slate-500">Belum ada aduan untuk otorisasi.</div>`}
    `);
  }

  function renderPelaporan() {
    const byStatus = ['verifikasi','penanganan','otorisasi','selesai'].map(s=>({s, c: state.aduan.filter(a=>a.status===s).length}));
    const max = Math.max(...byStatus.map(b=>b.c),1);
    return `
    <div class="grid lg:grid-cols-3 gap-6">
      ${card('Distribusi Status', `
        <div class="space-y-3">
          ${byStatus.map(b=>`
            <div>
              <div class="flex justify-between text-sm mb-1"><span class="capitalize">${b.s}</span><span class="font-semibold">${b.c}</span></div>
              <div class="h-2 rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden"><div class="h-full bg-emerald-600" style="width:${(b.c/max)*100}%"></div></div>
            </div>`).join('')}
        </div>
      `)}
      ${card('Kinerja SLA', `<div class="text-5xl font-black text-emerald-600">96%</div><div class="text-sm text-slate-500 mt-1">Aduan selesai tepat waktu</div>`)}
      ${card('Export', `<button class="w-full py-2.5 rounded-xl border font-medium hover:bg-slate-50 dark:hover:bg-slate-800">Export CSV</button><button class="w-full mt-2 py-2.5 rounded-xl bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-semibold">Export PDF</button>`)}
    </div>`;
  }

  function renderParameter() {
    return `
    <div class="grid lg:grid-cols-2 gap-6">
      ${card('Kategori Aduan', `
        <div class="space-y-2" id="kategori-list">
          ${state.kategori.map(k=>`<div class="flex items-center justify-between px-3 py-2 rounded-xl border">${k}<button class="text-xs text-rose-600">Hapus</button></div>`).join('')}
        </div>
        <div class="mt-3 flex gap-2">
          <input id="new-kategori" placeholder="Kategori baru" class="flex-1 rounded-xl border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 px-3 py-2 text-sm" />
          <button data-action="add-kategori" class="px-3 py-2 rounded-xl bg-emerald-600 text-white text-sm font-semibold">Tambah</button>
        </div>
      `)}
      ${card('Prioritas', `
        <div class="space-y-2">
          ${['Rendah','Sedang','Tinggi','Kritis'].map(p=>`<div class="px-3 py-2 rounded-xl border">${p}</div>`).join('')}
        </div>
      `)}
    </div>`;
  }

  function renderCMS() {
    const s = state.cms;
    return card('CMS Landing Page', `
      <div class="grid lg:grid-cols-2 gap-6">
        <div class="space-y-4">
          <div><label class="text-sm font-medium">Judul Hero</label><input id="cms-title" value="${s.heroTitle}" class="mt-1 w-full rounded-xl border px-3 py-2 text-sm bg-white dark:bg-slate-950"/></div>
          <div><label class="text-sm font-medium">Subjudul</label><textarea id="cms-sub" rows="3" class="mt-1 w-full rounded-xl border px-3 py-2 text-sm bg-white dark:bg-slate-950">${s.heroSubtitle}</textarea></div>
          <div><label class="text-sm font-medium">Badge</label><input id="cms-badge" value="${s.heroBadge}" class="mt-1 w-full rounded-xl border px-3 py-2 text-sm bg-white dark:bg-slate-950"/></div>
          <button data-action="save-cms" class="px-4 py-2.5 rounded-xl bg-emerald-600 text-white font-semibold text-sm">Simpan Perubahan</button>
        </div>
        <div class="rounded-2xl border p-5 bg-slate-50 dark:bg-slate-950">
          <div class="text-xs uppercase tracking-wide text-slate-500 mb-2">Preview</div>
          <div class="text-2xl font-bold">${s.heroTitle}</div>
          <div class="text-sm text-slate-600 dark:text-slate-400 mt-1">${s.heroSubtitle}</div>
        </div>
      </div>
    `);
  }

  function renderPengaturan() {
    return `
    <div class="grid lg:grid-cols-3 gap-6">
      <div class="lg:col-span-2">
        ${card('Profil Pengguna', `
          <div class="flex items-center gap-4">
            <div class="size-16 rounded-2xl bg-emerald-600 text-white grid place-items-center text-2xl font-black">${state.user.avatar}</div>
            <div>
              <div class="text-xl font-bold">${state.user.name}</div>
              <div class="text-sm text-slate-500">${state.user.email} • ${formatRole(state.user.role)}</div>
            </div>
          </div>
          <div class="mt-6 grid sm:grid-cols-2 gap-4">
            <div><label class="text-sm font-medium">Nama Lengkap</label><input value="${state.user.name}" class="mt-1 w-full rounded-xl border px-3 py-2 text-sm bg-slate-50 dark:bg-slate-950" readonly/></div>
            <div><label class="text-sm font-medium">Email</label><input value="${state.user.email}" class="mt-1 w-full rounded-xl border px-3 py-2 text-sm bg-slate-50 dark:bg-slate-950" readonly/></div>
          </div>
        `)}
      </div>
      <div>
        ${card('Keamanan', `
          <p class="text-sm text-slate-600 dark:text-slate-400">Ganti password secara berkala untuk menjaga keamanan akun.</p>
          <button data-action="open-password" class="mt-4 w-full py-2.5 rounded-xl bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-semibold text-sm">Ubah Password</button>
        `)}
      </div>
    </div>`;
  }

  function renderSuperadmin() {
    return card('Manajemen Pengguna', `
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead><tr class="text-left text-slate-500 border-b"><th class="py-2">Nama</th><th>Email</th><th>Role</th><th>Aksi</th></tr></thead>
          <tbody>
            ${state.users.map(u=>`
              <tr class="border-b border-slate-100 dark:border-slate-800">
                <td class="py-3 font-medium">${u.name}</td>
                <td class="py-3 text-slate-600 dark:text-slate-400">${u.email}</td>
                <td class="py-3">${formatRole(u.role)}</td>
                <td class="py-3"><button class="text-xs px-2 py-1 rounded-lg border">Reset Pass</button></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    `);
  }

  // ---------- Events ----------
  function bindAppEvents() {
    // sidebar module click
    $$('[data-module]').forEach(btn=>{
      btn.onclick = () => {
        state.activeModule = btn.dataset.module;
        render();
      };
    });
  }

  // Delegated
  document.addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const act = btn.dataset.action;

    if (act==='toggle-theme') {
      state.theme = state.theme==='dark' ? 'light' : 'dark';
      applyTheme(); render();
    }
    if (act==='go-login') { state.view='login'; render(); }
    if (act==='go-landing') { state.view='landing'; render(); }
    if (act==='toggle-sidebar') { $('#sidebar').classList.toggle('-translate-x-full'); }
    if (act==='open-password') { openPasswordModal(); }
    if (act==='open-settings') { state.activeModule='pengaturan'; render(); closeProfile(); }
    if (act==='logout') { supabase.auth.signOut().then(()=>{ toast('Berhasil keluar','success'); render(); }); }
    if (act==='add-aduan') { const id=`ADU-${Date.now().toString().slice(-6)}`; state.aduan.unshift({id, judul:'Aduan baru dari demo', kategori:'Lainnya', status:'verifikasi', prioritas:'Sedang', tanggal:new Date().toISOString().slice(0,10), pelapor:state.user.name}); save(); render(); toast('Aduan baru ditambahkan'); }
    if (act==='verify') { const a=state.aduan.find(x=>x.id===btn.dataset.id); if(a){a.status='penanganan'; save(); render(); toast('Aduan diverifikasi'); } }
    if (act==='process') { const a=state.aduan.find(x=>x.id===btn.dataset.id); if(a){a.status='otorisasi'; save(); render(); toast('Aduan diproses'); } }
    if (act==='authorize') { const a=state.aduan.find(x=>x.id===btn.dataset.id); if(a){a.status='selesai'; save(); render(); toast('Aduan disetujui & selesai'); } }
    if (act==='add-kategori') { const inp=$('#new-kategori'); if(inp.value.trim()){ state.kategori.push(inp.value.trim()); save(); render(); } }
    if (act==='save-cms') {
      state.cms.heroTitle = $('#cms-title').value;
      state.cms.heroSubtitle = $('#cms-sub').value;
      state.cms.heroBadge = $('#cms-badge').value;
      save(); toast('CMS disimpan'); render();
    }
  });

  // Profile dropdown
  document.addEventListener('click', e => {
    const btn = e.target.closest('#profile-btn');
    const menu = $('#profile-menu');
    if (btn) menu.classList.toggle('hidden');
    else if (!e.target.closest('#profile-menu')) menu?.classList.add('hidden');
  });
  function closeProfile(){ $('#profile-menu')?.classList.add('hidden'); }

  // Login form
  document.addEventListener('submit', async e => {
    if (e.target.id==='login-form') {
      e.preventDefault();
      const fd = new FormData(e.target);
      const { data, error } = await supabase.auth.signInWithPassword({ email: fd.get('email'), password: fd.get('password') });
      if (error) return toast(error.message,'error');
      state.view='app';
      toast('Selamat datang, '+state.user.name);
      render();
    }
    if (e.target.id==='password-form') {
      e.preventDefault();
      await handlePasswordSubmit();
    }
  });

  // Password modal
  function openPasswordModal() {
    $('#password-modal').classList.remove('hidden');
    $('#password-error').classList.add('hidden');
    $('#password-form').reset();
    closeProfile();
  }
  function closePasswordModal() {
    $('#password-modal').classList.add('hidden');
  }
  document.addEventListener('click', e => {
    if (e.target.dataset.close==='password-modal') closePasswordModal();
  });
  document.addEventListener('click', e => {
    const t = e.target.closest('[data-toggle]');
    if (t) {
      const inp = document.getElementById(t.dataset.toggle);
      inp.type = inp.type==='password' ? 'text' : 'password';
    }
  });

  async function handlePasswordSubmit() {
    const oldPw = $('#old-password').value.trim();
    const newPw = $('#new-password').value.trim();
    const conf = $('#confirm-password').value.trim();
    const errEl = $('#password-error');

    if (newPw.length < 6) {
      errEl.textContent = 'Password baru minimal 6 karakter.';
      errEl.classList.remove('hidden'); return;
    }
    if (newPw !== conf) {
      errEl.textContent = 'Konfirmasi password tidak cocok.';
      errEl.classList.remove('hidden'); return;
    }
    if (!oldPw) {
      errEl.textContent = 'Password lama wajib diisi.';
      errEl.classList.remove('hidden'); return;
    }
    errEl.classList.add('hidden');
    const btn = $('#password-submit');
    btn.disabled = true; btn.innerHTML = '<span>Menyimpan...</span>';

    // Simulate supabase call (password lama tidak diverifikasi server)
    const { error } = await supabase.auth.updateUser({ password: newPw });
    btn.disabled = false; btn.innerHTML = '<span>Simpan Password</span>';
    if (error) return toast(error.message,'error');
    closePasswordModal();
    toast('Password berhasil diubah. Anda tetap login.');
  }

  // Init
  render();
})();
</script>
