<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SIM Aduan Etik & Hukum - RSJD AHMA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'system-ui'] },

          glow: '0 0 0 1px rgba(99,102,241,.2), 0 8px 30px rgba(99,102,241,.15)'

        borderRadius: { '2xl': '1.25rem' }

  }
</script>
<style>
  :root { color-scheme: light dark; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
  .scroll-thin::-webkit-scrollbar { width: 6px; height: 6px; }
  .scroll-thin::-webkit-scrollbar-thumb { background: rgba(100,116,139,.4); border-radius: 9999px; }
  .backdrop-blur-safari { -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px); }
  @keyframes in { from { opacity:0; transform: translateY(4px) scale(.98);} to { opacity:1; transform:none; } }

</head>
<body class="bg-[#f6f8fb] dark:bg-[#050a14] text-slate-800 dark:text-slate-200 antialiased min-h-screen">
<div id="app" class="min-h-screen"></div>

<!-- Config Modal -->
<div id="configModal" class="fixed inset-0 z-[100] hidden">
  <div class="absolute inset-0 bg-slate-900/70 backdrop-blur-sm"></div>
  <div class="relative z-10 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-lg bg-white dark:bg-slate-900 rounded-2xl shadow-soft border border-slate-200 dark:border-slate-800 p-6 animate-in">
      <div class="flex items-start gap-3">
        <div class="w-11 h-11 rounded-2xl bg-indigo-600 text-white grid place-items-center shadow-glow">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 16a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </div>
        <div class="flex-1">
          <h2 class="text-xl font-bold">Konfigurasi Supabase</h2>
          <p class="text-sm text-slate-600 dark:text-slate-400 mt-1">Masukkan URL dan Anon Key proyek Supabase Anda. Disimpan lokal di browser.</p>
        </div>
      <form id="configForm" class="mt-5 space-y-4">
        <div>
          <label class="text-sm font-medium">SUPABASE_URL</label>
          <input id="cfgUrl" type="url" required placeholder="https://xxxx.supabase.co" class="mt-1 w-full rounded-xl border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2.5 outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div>
          <label class="text-sm font-medium">SUPABASE_ANON_KEY</label>
          <textarea id="cfgKey" required rows="3" placeholder="eyJhbGciOiJIUzI1NiIs..." class="mt-1 w-full rounded-xl border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2.5 outline-none focus:ring-2 focus:ring-indigo-500 font-mono text-xs"></textarea>
        </div>
        <div class="flex items-center justify-between pt-2">
          <button type="button" id="cfgCancel" class="px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 text-sm font-medium">Batal</button>
          <button class="px-5 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold shadow-glow">Simpan & Sambungkan</button>
        </div>
        <p class="text-xs text-slate-500 dark:text-slate-500">Kunci disimpan di localStorage <code>sb_url</code> & <code>sb_key</code>. Buka kembali via Pengaturan.</p>
      </form>
    </div>
  </div>
</div>

<!-- Generic Modal -->
<div id="genericModal" class="fixed inset-0 z-[90] hidden">
  <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" data-close></div>
  <div class="relative z-10 min-h-screen flex items-center justify-center p-4">
    <div id="genericModalContent" class="w-full max-w-3xl bg-white dark:bg-slate-900 rounded-2xl shadow-soft border border-slate-200 dark:border-slate-800 max-h-[85vh] overflow-hidden flex flex-col animate-in"></div>
  </div>
</div>

<!-- Toast Container -->
<div id="toastContainer" class="fixed top-4 right-4 z-[200] space-y-2 w-[320px]"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const $ = (s, el=document) => el.querySelector(s);
const $$ = (s, el=document) => [...el.querySelectorAll(s)];

const state = {
  supabase: null,
  user: null,
  profile: null,
  theme: localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'),
  cfg: { url: localStorage.getItem('sb_url') || '', key: localStorage.getItem('sb_key') || '' },
  currentPage: 'dashboard',
  sidebarOpen: false,
  authTab: 'login',
  kategori: [],
  subKategori: [],
  aduanList: [],
  stats: { total:0, terkirim:0, proses:0, selesai:0 },
  landing: { hero: null, fitur: [] },
  loading: false,
};

function setTheme(t){ state.theme=t; localStorage.setItem('theme',t); document.documentElement.classList.toggle('dark', t==='dark'); }
setTheme(state.theme);

function toast(msg, type='info'){
  const colors = {
    info: 'bg-slate-900 text-white dark:bg-slate-800',
    success: 'bg-emerald-600 text-white',
    error: 'bg-rose-600 text-white',
    warning: 'bg-amber-500 text-white'
  };
  const el = document.createElement('div');
  el.className = `animate-in px-4 py-3 rounded-2xl shadow-soft text-sm font-medium ${colors[type]} flex items-start gap-2`;
  el.innerHTML = `<span class="mt-0.5">•</span><span class="flex-1">${msg}</span><button class="opacity-70 hover:opacity-100" data-close>✕</button>`;
  $('#toastContainer').appendChild(el);
  el.querySelector('[data-close]').onclick = () => el.remove();
  setTimeout(()=> el.remove(), 5000);
}

function showConfig(show=true){
  $('#configModal').classList.toggle('hidden', !show);
  if(show){
    $('#cfgUrl').value = state.cfg.url;
    $('#cfgKey').value = state.cfg.key;
  }
}

function initSupabase(){
  if(!state.cfg.url || !state.cfg.key){
    showConfig(true);
    return false;
  }
  try{
    state.supabase = createClient(state.cfg.url, state.cfg.key, { auth:{ persistSession:true, autoRefreshToken:true } });
    state.supabase.auth.onAuthStateChange(async (ev, session)=>{
      state.user = session?.user ?? null;
      if(state.user){
        await fetchProfile();
      }else{
        state.profile = null;
      }
      render();
    });
    // initial session
    state.supabase.auth.getSession().then(async ({data})=>{
      state.user = data.session?.user ?? null;
      if(state.user) await fetchProfile();
      render();
    });
    fetchLanding();
    return true;
  }catch(e){
    console.error(e);
    toast('Gagal inisialisasi Supabase: '+e.message,'error');
    showConfig(true);
    return false;
  }
}

async function fetchProfile(){
  if(!state.supabase || !state.user) return;
  const { data, error } = await state.supabase.from('users').select('*').eq('email', state.user.email).limit(1).maybeSingle();
  if(error){ console.warn(error); }
  state.profile = data || { email: state.user.email, role: 'pelapor', nama_lengkap: state.user.user_metadata?.nama_lengkap || '' };
}

async function fetchLanding(){
  if(!state.supabase) return;
  try{
    const { data: hero } = await state.supabase.from('konten_landing').select('*').eq('tipe','hero').limit(1).maybeSingle();
    const { data: fitur } = await state.supabase.from('konten_landing').select('*').eq('tipe','fitur').order('urutan',{ascending:true});
    state.landing.hero = hero || { judul:'SIM Aduan Etik & Hukum RSJD AHMA', subjudul:'Sistem terpadu untuk pelaporan, verifikasi, penanganan, dan otorisasi aduan etik & hukum secara transparan dan akuntabel.' };
    state.landing.fitur = fitur?.length ? fitur : [
      { judul:'Pelaporan Mudah', isi:'Form aduan lengkap dengan unggah bukti digital.' },
      { judul:'Verifikasi Cepat', isi:'Alur verifikasi terstruktur oleh verifikator.' },
      { judul:'Penanganan Transparan', isi:'Tracking tahapan penanganan real-time.' },
      { judul:'Otorisasi Aman', isi:'Persetujuan bertingkat oleh otorisator.' },
    ];
    render();
  }catch(e){ /* ignore */ }
}

async function fetchKategori(){
  if(!state.supabase) return;
  const { data } = await state.supabase.from('kategori_aduan').select('*').order('nama');
  state.kategori = data || [];
  const { data: sub } = await state.supabase.from('sub_kategori').select('*').order('nama');
  state.subKategori = sub || [];
}

async function fetchStats(){
  if(!state.supabase) return;
  const { data, error } = await state.supabase.from('aduan').select('status');
  if(error) return;
  const total = data.length;
  const terkirim = data.filter(d=>d.status?.toLowerCase()==='terkirim').length;
  const proses = data.filter(d=>['diverifikasi','proses','menunggu otorisasi'].includes(d.status?.toLowerCase())).length;
  const selesai = data.filter(d=>d.status?.toLowerCase()==='selesai').length;
  state.stats = { total, terkirim, proses, selesai };
}

async function fetchDaftarAduan(){
  if(!state.supabase) return;
  const { data, error } = await state.supabase.from('pengaduan').select('*').order('created_at',{ascending:false}).limit(200);
  if(error){ toast('Gagal memuat aduan','error'); return; }
  state.aduanList = data || [];
}

function roleCan(role, page){
  const all = ['dashboard','buat_aduan','daftar_aduan','verifikasi','penanganan','otorisasi','pengaturan'];
  const map = {
    superadmin: all,
    admin_sistem: all,
    pelapor: ['dashboard','buat_aduan','daftar_aduan','pengaturan'],
    operator: ['dashboard','daftar_aduan','verifikasi','pengaturan'],
    verifikator: ['dashboard','daftar_aduan','verifikasi','pengaturan'],
    komite_etik: ['dashboard','daftar_aduan','penanganan','pengaturan'],
    investigator: ['dashboard','daftar_aduan','penanganan','pengaturan'],
    pic: ['dashboard','daftar_aduan','penanganan','pengaturan'],
    otorisator: ['dashboard','daftar_aduan','otorisasi','pengaturan'],
    pimpinan: ['dashboard','daftar_aduan','pengaturan'],
    auditor: ['dashboard','daftar_aduan','pengaturan'],
  };
  const allowed = map[role] || map.pelapor;
  return allowed.includes(page);
}

function menuItems(){
  const role = state.profile?.role || 'pelapor';
  const items = [
    { key:'dashboard', label:'Dashboard', icon:'📊' },
    { key:'buat_aduan', label:'Buat Aduan', icon:'📝' },
    { key:'daftar_aduan', label:'Daftar Aduan', icon:'📋' },
    { key:'verifikasi', label:'Verifikasi', icon:'✅' },
    { key:'penanganan', label:'Penanganan', icon:'🔧' },
    { key:'otorisasi', label:'Otorisasi', icon:'🔐' },
    { key:'pengaturan', label:'Pengaturan', icon:'⚙️' },
  ];
  return items.filter(it=>roleCan(role,it.key));
}

function fmtDate(s){
  if(!s) return '-';
  try{ return new Date(s).toLocaleString('id-ID',{ dateStyle:'medium', timeStyle:'short' }); }catch{ return s; }
}

function statusBadge(s){
  const st = (s||'').toLowerCase();
  const map = {
    terkirim:'bg-sky-100 text-sky-700 dark:bg-sky-900/40 dark:text-sky-300',
    diverifikasi:'bg-indigo-100 text-indigo-700 dark:bg-indigo-900/40 dark:text-indigo-300',
    proses:'bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-300',
    'menunggu otorisasi':'bg-purple-100 text-purple-700 dark:bg-purple-900/40 dark:text-purple-300',
    selesai:'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300',
    ditolak:'bg-rose-100 text-rose-700 dark:bg-rose-900/40 dark:text-rose-300',
  };
  return `<span class="px-2.5 py-1 rounded-full text-xs font-semibold ${map[st]||'bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200'}">${s||'-'}</span>`;
}

function priorityBadge(p){
  const map = {
    tinggi:'bg-rose-600 text-white',
    sedang:'bg-amber-500 text-white',
    rendah:'bg-slate-500 text-white'
  };
  return `<span class="px-2 py-0.5 rounded-full text-[11px] font-bold uppercase tracking-wide ${map[(p||'').toLowerCase()]||'bg-slate-500 text-white'}">${p||'-'}</span>`;
}

// ---------- RENDER ----------
function render(){
  const root = $('#app');
  if(!state.supabase){
    root.innerHTML = renderShell(renderConfigNeeded());
    return;
  }
  if(!state.user){
    root.innerHTML = renderShell(renderLanding());
    bindLanding();
    return;
  }
  // logged in
  root.innerHTML = renderShell(renderAppLayout());
  bindApp();
  // load data per page
  if(state.currentPage==='dashboard'){ fetchStats().then(renderStats); }
  if(state.currentPage==='daftar_aduan'){ fetchDaftarAduan().then(renderDaftar); }
  if(state.currentPage==='buat_aduan'){ fetchKategori().then(renderBuatForm); }
  if(['verifikasi','penanganan','otorisasi'].includes(state.currentPage)){ fetchDaftarAduan().then(renderWorklist); }
}

function renderShell(inner){
  return `
  <div class="min-h-screen">
    ${inner}
  </div>`;
}

function renderConfigNeeded(){
  return `
  <div class="min-h-screen grid place-items-center p-6">
    <div class="max-w-md w-full bg-white dark:bg-slate-900 rounded-2xl shadow-soft border border-slate-200 dark:border-slate-800 p-8 text-center">
      <div class="w-14 h-14 rounded-2xl bg-indigo-600 text-white grid place-items-center mx-auto shadow-glow">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v18M3 12h18"/></svg>
      </div>
      <h1 class="mt-4 text-2xl font-extrabold">Konfigurasi Diperlukan</h1>
      <p class="mt-2 text-slate-600 dark:text-slate-400 text-sm">Hubungkan aplikasi ke Supabase Anda untuk melanjutkan.</p>
      <button id="openCfg" class="mt-6 w-full py-3 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold">Buka Konfigurasi</button>
    </div>
  </div>`;
}

function renderLanding(){
  const hero = state.landing.hero || {};
  const fitur = state.landing.fitur;
  return `
  <header class="sticky top-0 z-40 backdrop-blur-safari bg-white/70 dark:bg-slate-950/70 border-b border-slate-200 dark:border-slate-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-indigo-600 text-white grid place-items-center font-black">AH</div>
        <div>
          <div class="font-bold leading-tight">SIM Aduan Etik & Hukum</div>
          <div class="text-xs text-slate-500 -mt-0.5">RSJD AHMA</div>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button id="themeToggle" class="w-9 h-9 grid place-items-center rounded-xl border border-slate-300 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800" title="Tema">${state.theme==='dark'?'☀️':'🌙'}</button>
        <button id="btnLogin" class="px-4 py-2 rounded-xl bg-indigo-600 text-white text-sm font-semibold">Masuk</button>
      </div>
    </div>
  </header>
  <main>
    <section class="relative overflow-hidden">
      <div class="absolute inset-0 bg-gradient-to-br from-indigo-600 via-violet-600 to-fuchsia-600 opacity-10 dark:opacity-20"></div>
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 lg:py-24 grid lg:grid-cols-2 gap-12 items-center">
        <div>
          <span class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-indigo-50 dark:bg-indigo-950 text-indigo-700 dark:text-indigo-300 text-xs font-semibold">Sistem Resmi RSJD AHMA</span>
          <h1 class="mt-4 text-4xl lg:text-5xl font-extrabold tracking-tight">${hero.judul||'SIM Aduan Etik & Hukum RSJD AHMA'}</h1>
          <p class="mt-4 text-lg text-slate-600 dark:text-slate-300">${hero.subjudul||''}</p>
          <div class="mt-8 flex gap-3">
            <button id="heroLogin" class="px-6 py-3 rounded-2xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold shadow-glow">Masuk Sekarang</button>
            <button id="heroDaftar" class="px-6 py-3 rounded-2xl border border-slate-300 dark:border-slate-700 font-bold hover:bg-slate-50 dark:hover:bg-slate-800">Daftar Pelapor</button>
          </div>
        <div class="relative">
          <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-soft border border-slate-200 dark:border-slate-800 p-6">
            <div class="flex items-center justify-between mb-4">
              <div class="font-bold">Autentikasi</div>
              <div class="flex bg-slate-100 dark:bg-slate-800 rounded-xl p-1 text-sm">
                <button data-tab="login" class="px-3 py-1.5 rounded-lg ${state.authTab==='login'?'bg-white dark:bg-slate-700 shadow':''} font-semibold">Masuk</button>
                <button data-tab="daftar" class="px-3 py-1.5 rounded-lg ${state.authTab==='daftar'?'bg-white dark:bg-slate-700 shadow':''} font-semibold">Daftar</button>
              </div>
            </div>
            <div id="authFormWrap"></div>
          </div>
        </div>
      </div>
    </section>
    <section class="py-16 bg-white dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <h2 class="text-2xl font-extrabold text-center">Fitur Unggulan</h2>
        <div class="mt-10 grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
          ${fitur.map(f=>`
            <div class="p-6 rounded-2xl border border-slate-200 dark:border-slate-800 bg-gradient-to-b from-white to-slate-50 dark:from-slate-900 dark:to-slate-950">
              <div class="w-10 h-10 rounded-xl bg-indigo-600/10 text-indigo-600 grid place-items-center font-bold">✓</div>
              <h3 class="mt-3 font-bold">${f.judul}</h3>
              <p class="mt-1 text-sm text-slate-600 dark:text-slate-400">${f.isi||''}</p>
            </div>
          `).join('')}
        </div>
      </div>
    </section>
    <footer class="py-8 text-center text-sm text-slate-500">© ${new Date().getFullYear()} RSJD AHMA. All rights reserved.</footer>
  </main>`;
}

function renderAuthForm(){
  if(state.authTab==='login'){
    return `
    <form id="loginForm" class="space-y-4">
      <div>
        <label class="text-sm font-medium">Email</label>
        <input name="email" type="email" required class="mt-1 w-full rounded-xl border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2.5">
      </div>
      <div>
        <label class="text-sm font-medium">Password</label>
        <input name="password" type="password" required class="mt-1 w-full rounded-xl border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2.5">
      </div>
      <button class="w-full py-3 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold">Masuk</button>
      <p class="text-xs text-slate-500 text-center">Belum punya akun? Klik <b>Daftar</b> di atas.</p>
    </form>`;
  } else {
    return `
    <form id="signupForm" class="space-y-4">
      <div>
        <label class="text-sm font-medium">Nama Lengkap</label>
        <input name="nama" required class="mt-1 w-full rounded-xl border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2.5">
      </div>
      <div>
        <label class="text-sm font-medium">Email</label>
        <input name="email" type="email" required class="mt-1 w-full rounded-xl border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2.5">
      </div>
      <div>
        <label class="text-sm font-medium">Password</label>
        <input name="password" type="password" required minlength="6" class="mt-1 w-full rounded-xl border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2.5">
      </div>
      <button class="w-full py-3 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-bold">Daftar sebagai Pelapor</button>
      <p class="text-xs text-slate-500 text-center">Dengan mendaftar, Anda setuju pada kebijakan privasi.</p>
    </form>`;
  }
}

function renderAppLayout(){
  const items = menuItems();
  const role = state.profile?.role || '-';
  const name = state.profile?.nama_lengkap || state.user?.email || '';
  return `
  <div class="min-h-screen flex">
    <!-- Sidebar -->
    <aside class="fixed lg:sticky top-0 z-40 h-screen w-[280px] bg-white dark:bg-slate-950 border-r border-slate-200 dark:border-slate-800 transform ${state.sidebarOpen?'translate-x-0':'-translate-x-full lg:translate-x-0'} transition-transform duration-300 flex flex-col">
      <div class="h-16 flex items-center gap-3 px-5 border-b border-slate-200 dark:border-slate-800">
        <div class="w-10 h-10 rounded-2xl bg-indigo-600 text-white grid place-items-center font-black shadow-glow">AH</div>
        <div>
          <div class="font-extrabold leading-tight">SIM Aduan</div>
          <div class="text-[11px] uppercase tracking-wider text-slate-500">RSJD AHMA</div>
        </div>
        <button id="closeSidebar" class="lg:hidden ml-auto w-9 h-9 grid place-items-center rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800">✕</button>
      </div>

function bindLanding(){
  $('#themeToggle')?.addEventListener('click', ()=>{ setTheme(state.theme==='dark'?'light':'dark'); render(); });
  $('#btnLogin')?.addEventListener('click', ()=>{ document.querySelector('[data-tab="login"]')?.click(); document.getElementById('authFormWrap')?.scrollIntoView({behavior:'smooth'}); });
  $('#heroLogin')?.addEventListener('click', ()=>{ document.querySelector('[data-tab="login"]')?.click(); });
  $('#heroDaftar')?.addEventListener('click', ()=>{ document.querySelector('[data-tab="daftar"]')?.click(); });
  $$('[data-tab]').forEach(btn=>{
    btn.onclick = ()=>{ state.authTab = btn.dataset.tab; render(); };
  });
  $('#authFormWrap').innerHTML = renderAuthForm();
  $('#loginForm')?.addEventListener('submit', async e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const { error } = await state.supabase.auth.signInWithPassword({ email: fd.get('email'), password: fd.get('password') });
    if(error) toast(error.message,'error'); else toast('Berhasil masuk','success');
  });
  $('#signupForm')?.addEventListener('submit', async e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const { error } = await state.supabase.auth.signUp({
      email: fd.get('email'),
      password: fd.get('password'),
      options:{ data:{ nama_lengkap: fd.get('nama'), role:'pelapor' } }
    });
    if(error) toast(error.message,'error'); else toast('Pendaftaran berhasil. Silakan cek email untuk verifikasi.','success');
  });
}

function renderBuatForm(){
  const katSel = $('#katSel');
  if(!katSel) return;
  katSel.innerHTML = `<option value="">Pilih...</option>` + state.kategori.map(k=>`<option value="${k.id}">${k.nama}</option>`).join('');
  katSel.onchange = ()=>{
    const sub = state.subKategori.filter(s=>s.kategori_id==katSel.value);
    $('#subKatSel').innerHTML = `<option value="">Pilih...</option>` + sub.map(s=>`<option value="${s.id}">${s.nama}</option>`).join('');
  };
  $('#formAduan')?.addEventListener('submit', async e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const file = fd.get('bukti');
    let bukti_url = null;
    if(file && file.size>0){
      if(file.size > 10*1024*1024){ toast('File terlalu besar','error'); return; }
      const ext = file.name.split('.').pop();
      const path = `aduan/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
      const { error: upErr } = await state.supabase.storage.from('bukti_digital').upload(path, file, { upsert:false });
      if(upErr){ toast('Upload gagal: '+upErr.message,'error'); return; }
      const { data } = state.supabase.storage.from('bukti_digital').getPublicUrl(path);
      bukti_url = data.publicUrl;
    }
    const payload = {
      nama_pelapor: fd.get('nama_pelapor'),
      kontak: fd.get('kontak'),
      email_pelapor: fd.get('email_pelapor'),
      kategori_id: fd.get('kategori_id') || null,
      sub_kategori_id: fd.get('sub_kategori_id') || null,
      prioritas: fd.get('prioritas'),
      urgensi: fd.get('urgensi'),
      tanggal_kejadian: fd.get('tanggal_kejadian') ? new Date(fd.get('tanggal_kejadian')).toISOString() : null,
      lokasi: fd.get('lokasi'),
      deskripsi: fd.get('deskripsi'),
      bukti_url,
      status: 'Terkirim',
      pelapor_id: state.profile?.id || null,
    };
    const { error } = await state.supabase.from('aduan').insert(payload);
    if(error){ toast('Gagal menyimpan: '+error.message,'error'); }
    else { toast('Aduan berhasil dikirim','success'); e.target.reset(); state.currentPage='daftar_aduan'; render(); }
  });
}

  if(state.currentPage==='penanganan') filter = ['diverifikasi','proses'];
  if(state.currentPage==='otorisasi') filter = ['menunggu otorisasi'];
  const rows = state.aduanList.filter(r=> filter.includes((r.status||'').toLowerCase()));
  body.innerHTML = rows.map(r=>`
    <tr class="border-t border-slate-200 dark:border-slate-800">
      <td class="py-3 pr-4 font-mono text-xs">${r.nomor_aduan||'-'}</td>
      <td class="py-3 pr-4 font-semibold">${r.nama_pelapor||'-'}</td>
      <td class="py-3 pr-4">${statusBadge(r.status)}</td>
      <td class="py-3 pr-4">${priorityBadge(r.prioritas)}</td>
      <td class="py-3 pr-4 text-slate-600 dark:text-slate-400">${fmtDate(r.created_at)}</td>
      <td class="py-3 text-right">
        <button data-act="${r.id}" class="px-3 py-1.5 rounded-xl bg-indigo-600 text-white text-xs font-bold">
          ${state.currentPage==='verifikasi'?'Verifikasi': state.currentPage==='penanganan'?'Tangani':'Otorisasi'}
        </button>
      </td>
    </tr>
  `).join('') || `<tr><td colspan="6" class="py-10 text-center text-slate-500">Tidak ada aduan untuk ditindak</td></tr>`;
  $$('[data-act]').forEach(btn=> btn.onclick = ()=> openAction(btn.dataset.act));
}

async function openAction(id){
  const aduan = state.aduanList.find(a=>a.id==id);
  if(!aduan) return;
  if(state.currentPage==='verifikasi'){
    const html = `
      <div class="p-6 border-b border-slate-200 dark:border-slate-800 flex justify-between items-start">
        <div><h3 class="text-xl font-extrabold">Verifikasi Aduan</h3><p class="text-sm text-slate-500 font-mono">${aduan.nomor_aduan}</p></div>
        <button data-close class="w-9 h-9 grid place-items-center rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800">✕</button>
      </div>
      <form id="formVerif" class="p-6 space-y-4">
        <div>
          <label class="text-sm font-medium">Hasil Verifikasi</label>
          <select name="hasil" required class="mt-1 w-full rounded-xl border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2.5">
            <option value="Valid">Valid / Diterima</option>
            <option value="Ditolak">Ditolak</option>
          </select>
        </div>
        <div>
          <label class="text-sm font-medium">Catatan</label>
          <textarea name="catatan" rows="3" class="mt-1 w-full rounded-xl border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2.5"></textarea>
        </div>
        <div class="flex justify-end gap-2">
          <button type="button" data-close class="px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700">Batal</button>
          <button class="px-5 py-2.5 rounded-xl bg-indigo-600 text-white font-bold">Simpan</button>
        </div>
      </form>`;
    openGeneric(html);
    $('#formVerif').onsubmit = async e=>{
      e.preventDefault();
      const fd = new FormData(e.target);
      const hasil = fd.get('hasil');
      const catatan = fd.get('catatan');
      const { error:e1 } = await state.supabase.from('verifikasi').insert({ aduan_id:id, verifikator_id: state.profile?.id||null, hasil, catatan });
      if(e1){ toast('Gagal simpan verifikasi','error'); return; }
      const newStatus = hasil==='Valid'?'Diverifikasi':'Ditolak';
      await state.supabase.from('aduan').update({ status:newStatus }).eq('id',id);
      await state.supabase.from('log_aktivitas').insert({ aduan_id:id, aktivitas:'Verifikasi', keterangan:`Hasil: ${hasil}` });
      toast('Verifikasi tersimpan','success');
      $('#genericModal').classList.add('hidden');
      fetchDaftarAduan().then(render);
    };
  }
  if(state.currentPage==='penanganan'){
    const html = `
      <div class="p-6 border-b border-slate-200 dark:border-slate-800 flex justify-between">
        <div><h3 class="text-xl font-extrabold">Tambah Tahap Penanganan</h3><p class="text-sm text-slate-500 font-mono">${aduan.nomor_aduan}</p></div>
        <button data-close class="w-9 h-9 grid place-items-center rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800">✕</button>
      </div>
      <form id="formTangani" class="p-6 space-y-4">
        <div><label class="text-sm font-medium">Tahap</label><input name="tahap" required class="mt-1 w-full rounded-xl border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2.5"></div>
        <div><label class="text-sm font-medium">Catatan</label><textarea name="catatan" rows="3" class="mt-1 w-full rounded-xl border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2.5"></textarea></div>
        <div class="flex justify-end gap-2"><button data-close type="button" class="px-4 py-2.5 rounded-xl border">Batal</button><button class="px-5 py-2.5 rounded-xl bg-amber-600 text-white font-bold">Simpan</button></div>
      </form>`;
    openGeneric(html);
    $('#formTangani').onsubmit = async e=>{
      e.preventDefault();
      const fd = new FormData(e.target);
      await state.supabase.from('penanganan_tahap').insert({ aduan_id:id, pic_id: state.profile?.id||null, tahap: fd.get('tahap'), catatan: fd.get('catatan') });
      await state.supabase.from('aduan').update({ status:'Proses' }).eq('id',id);
      await state.supabase.from('log_aktivitas').insert({ aduan_id:id, aktivitas:'Penanganan', keterangan: fd.get('tahap') });
      toast('Tahap ditambahkan','success');
      $('#genericModal').classList.add('hidden');
      fetchDaftarAduan().then(render);
    };
  }
  if(state.currentPage==='otorisasi'){
    const html = `
      <div class="p-6 border-b border-slate-200 dark:border-slate-800 flex justify-between">
        <div><h3 class="text-xl font-extrabold">Otorisasi Aduan</h3><p class="text-sm text-slate-500 font-mono">${aduan.nomor_aduan}</p></div>
        <button data-close class="w-9 h-9 grid place-items-center rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800">✕</button>
      </div>
      <form id="formOtor" class="p-6 space-y-4">
        <div><label class="text-sm font-medium">Keputusan</label><select name="keputusan" required class="mt-1 w-full rounded-xl border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2.5"><option>Disetujui</option><option>Ditolak</option></select></div>
        <div><label class="text-sm font-medium">Catatan</label><textarea name="catatan" rows="3" class="mt-1 w-full rounded-xl border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2.5"></textarea></div>
        <div class="flex justify-end gap-2"><button data-close type="button" class="px-4 py-2.5 rounded-xl border">Batal</button><button class="px-5 py-2.5 rounded-xl bg-purple-600 text-white font-bold">Simpan</button></div>
      </form>`;
    openGeneric(html);
    $('#formOtor').onsubmit = async e=>{
      e.preventDefault();
      const fd = new FormData(e.target);
      await state.supabase.from('otorisasi').insert({ aduan_id:id, otorisator_id: state.profile?.id||null, keputusan: fd.get('keputusan'), catatan: fd.get('catatan') });
      const newStatus = fd.get('keputusan')==='Disetujui'?'Selesai':'Ditolak';
      await state.supabase.from('aduan').update({ status:newStatus }).eq('id',id);
      await state.supabase.from('log_aktivitas').insert({ aduan_id:id, aktivitas:'Otorisasi', keterangan: fd.get('keputusan') });
      toast('Otorisasi tersimpan','success');
      $('#genericModal').classList.add('hidden');
      fetchDaftarAduan().then(render);
    };
  }
}

function renderPengaturan(){
  return `
  <div class="max-w-3xl space-y-6">
    <div class="rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 shadow-soft">
      <h3 class="text-xl font-extrabold">Profil Pengguna</h3>
      <div class="mt-4 grid sm:grid-cols-2 gap-4 text-sm">
        <div><div class="text-xs uppercase font-bold text-slate-500">Nama</div><div class="font-semibold mt-1">${state.profile?.nama_lengkap||'-'}</div></div>
        <div><div class="text-xs uppercase font-bold text-slate-500">Email</div><div class="font-semibold mt-1">${state.profile?.email||state.user?.email}</div></div>
        <div><div class="text-xs uppercase font-bold text-slate-500">Role</div><div class="font-semibold mt-1 capitalize">${state.profile?.role||'-'}</div></div>
        <div><div class="text-xs uppercase font-bold text-slate-500">ID</div><div class="font-mono text-xs mt-1">${state.profile?.id||'-'}</div></div>
      </div>
    </div>
    <div class="rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 shadow-soft">
      <h3 class="font-bold text-lg">Ubah Password</h3>
      <form id="formPass" class="mt-4 grid sm:grid-cols-2 gap-4">
        <div class="sm:col-span-2"><label class="text-sm font-medium">Password Baru</label><input name="pass" type="password" minlength="6" required class="mt-1 w-full rounded-xl border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2.5"></div>
        <div class="sm:col-span-2 flex justify-end"><button class="px-5 py-2.5 rounded-xl bg-indigo-600 text-white font-bold">Update Password</button></div>
      </form>
    </div>
    <div class="rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 shadow-soft">
      <h3 class="font-bold text-lg">Konfigurasi Supabase</h3>
      <p class="text-sm text-slate-600 dark:text-slate-400 mt-1">URL: <span class="font-mono text-xs">${state.cfg.url||'-'}</span></p>
      <button id="openCfg2" class="mt-4 px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 font-semibold">Buka Konfigurasi</button>
    </div>
  </div>`;
}
document.addEventListener('click', e=>{
  if(e.target.id==='openCfg2') showConfig(true);
});
document.addEventListener('submit', e=>{
  if(e.target.id==='formPass'){
    e.preventDefault();
    const pass = e.target.pass.value;
    state.supabase.auth.updateUser({ password: pass }).then(({error})=>{
      if(error) toast(error.message,'error'); else toast('Password diperbarui','success');
    });
  }
});

// Config form binding
$('#configForm').addEventListener('submit', e=>{
  e.preventDefault();
  const url = $('#cfgUrl').value.trim();
  const key = $('#cfgKey').value.trim();
  localStorage.setItem('sb_url', url);
  localStorage.setItem('sb_key', key);
  state.cfg = { url, key };
  showConfig(false);
  initSupabase();
  render();
  toast('Konfigurasi disimpan','success');
});
$('#cfgCancel').addEventListener('click', ()=> showConfig(false));
document.addEventListener('click', e=>{
  if(e.target.id==='openCfg') showConfig(true);
});

// Init
if(!state.cfg.url || !state.cfg.key){
  // show config later after first render
}
initSupabase();
render();

// Ensure app renders even if supabase not configured
if(!state.supabase){
  setTimeout(()=>{ if(!state.supabase) { render(); } }, 0);
}
</script>
